<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .nav-link.active { background-color: #3b82f6; color: white; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white shadow-sm mb-8">
        <div class="max-w-6xl mx-auto px-4 text-sm font-medium">
            <div class="flex justify-between h-16 items-center">
                <div class="flex space-x-4">
                    <button onclick="showPage('home')" id="home-btn" class="nav-link active px-6 py-2 rounded-lg transition-all flex items-center">
                        <i class="fas fa-home mr-2"></i> Home
                    </button>
                    <button onclick="showPage('dashboard')" id="dash-btn" class="nav-link px-6 py-2 rounded-lg transition-all flex items-center text-gray-600 hover:bg-gray-100">
                        <i class="fas fa-chart-line mr-2"></i> Dashboard
                    </button>
                </div>
                <div id="connection-status" class="flex items-center text-emerald-600">
                    <i class="fas fa-circle text-[10px] mr-2"></i> Live
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pb-12">
        <div id="home-page" class="space-y-8">
            <div class="bg-white rounded-3xl p-16 text-center card-shadow border border-gray-50">
                <h1 class="text-6xl font-extrabold text-slate-800 mb-4 tracking-tight">Smart Library System</h1>
                <p class="text-slate-400 text-xl font-light">Real-time monitoring of book scans and system status</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div id="status-card-bg" class="bg-white p-8 rounded-3xl card-shadow flex items-center space-x-6 transition-all duration-500">
                    <div id="status-icon" class="w-16 h-16 bg-slate-400 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div>
                        <h3 id="system-text" class="text-3xl font-black text-slate-800">Loading...</h3>
                        <p id="last-update-time" class="text-slate-400 font-mono">--:--:--</p>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-3xl card-shadow flex items-center space-x-6 border border-gray-50">
                    <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg">
                        <i class="fas fa-book-reader"></i>
                    </div>
                    <div>
                        <h3 class="text-slate-500 font-semibold uppercase tracking-wider text-xs mb-1">Currently Borrowed</h3>
                        <p class="text-5xl font-black text-slate-800" id="borrowed-count">0</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="dashboard-page" class="hidden">
            <div class="bg-white rounded-3xl card-shadow overflow-hidden border border-gray-100">
                <div class="p-8 bg-white border-b border-gray-100 flex justify-between items-center">
                    <h2 class="text-3xl font-extrabold text-slate-800">Activity Log</h2>
                    <span class="text-slate-400 text-sm font-medium" id="total-scans-label">0 Total Records</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="p-5 font-bold text-slate-500 uppercase text-xs tracking-widest">Card ID</th>
                                <th class="p-5 font-bold text-slate-500 uppercase text-xs tracking-widest">Book Name</th>
                                <th class="p-5 font-bold text-slate-500 uppercase text-xs tracking-widest">Status</th>
                                <th class="p-5 font-bold text-slate-500 uppercase text-xs tracking-widest">Date</th>
                                <th class="p-5 font-bold text-slate-500 uppercase text-xs tracking-widest">Time</th>
                            </tr>
                        </thead>
                        <tbody id="logs-table-body" class="divide-y divide-slate-100 text-slate-700"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = window.location.origin;

        async function fetchData() {
            try {
                const [logsRes, statusRes] = await Promise.all([
                    fetch(`${API_BASE}/api/logs`),
                    fetch(`${API_BASE}/api/status`)
                ]);
                
                const logs = await logsRes.json();
                const statusData = await statusRes.json();
                
                updateUI(logs);
                updateSystemStatus(statusData.isSystemActive);
            } catch (err) {
                console.error("Sync Error");
            }
        }

        function updateUI(logs) {
            const dataRows = logs.slice(1); // تجاهل الهيدر
            const tbody = document.getElementById('logs-table-body');
            tbody.innerHTML = '';

            let currentBorrowed = 0;
            // ترتيب البيانات بحيث الأحدث يظهر فوق
            const displayRows = [...dataRows].reverse();

            // حساب العداد المنطقي (Borrowed يزيد، Returned ينقص)
            dataRows.forEach(row => {
                const status = row[2];
                if (status === 'Borrowed') currentBorrowed++;
                if (status === 'Returned' && currentBorrowed > 0) currentBorrowed--;
            });

            displayRows.forEach((row) => {
                const [id, name, status, date, time] = row;
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-5 font-mono text-sm text-blue-600">${id}</td>
                    <td class="p-5 font-semibold text-slate-800">${name}</td>
                    <td class="p-5">
                        <span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-tighter ${status === 'Borrowed' ? 'bg-orange-100 text-orange-600' : status === 'Returned' ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-blue-600'}">
                            ${status}
                        </span>
                    </td>
                    <td class="p-5 text-slate-400 text-sm">${date}</td>
                    <td class="p-5 text-slate-400 text-sm">${time}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('borrowed-count').innerText = currentBorrowed;
            document.getElementById('total-scans-label').innerText = `${dataRows.length} Total Records`;
            
            // تحديث وقت أخر عملية في الكارت
            if (displayRows.length > 0) {
                document.getElementById('last-update-time').innerText = displayRows[0][4];
            }
        }

        function updateSystemStatus(isActive) {
            const systemText = document.getElementById('system-text');
            const cardBg = document.getElementById('status-card-bg');
            const icon = document.getElementById('status-icon');

            if (isActive) {
                systemText.innerText = "System ACTIVE";
                systemText.className = "text-3xl font-black text-emerald-600";
                icon.className = "w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg";
            } else {
                systemText.innerText = "System LOCKED";
                systemText.className = "text-3xl font-black text-red-600";
                icon.className = "w-16 h-16 bg-red-500 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg";
            }
        }

        function showPage(page) {
            document.getElementById('home-page').classList.toggle('hidden', page !== 'home');
            document.getElementById('dashboard-page').classList.toggle('hidden', page !== 'dashboard');
            document.getElementById('home-btn').classList.toggle('active', page === 'home');
            document.getElementById('dash-btn').classList.toggle('active', page === 'dashboard');
        }

        setInterval(fetchData, 3000);
        fetchData();
    </script>
</body>
</html>
