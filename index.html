<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .nav-link.active { background-color: #3b82f6; color: white; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white shadow-sm mb-8">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between h-16 items-center">
                <div class="flex space-x-4">
                    <button onclick="showPage('home')" id="home-btn" class="nav-link active px-6 py-2 rounded-lg transition-all flex items-center">
                        <i class="fas fa-home mr-2"></i> Home
                    </button>
                    <button onclick="showPage('dashboard')" id="dash-btn" class="nav-link px-6 py-2 rounded-lg transition-all flex items-center text-gray-600 hover:bg-gray-100">
                        <i class="fas fa-chart-line mr-2"></i> Dashboard
                    </button>
                </div>
                <div id="connection-status" class="text-sm font-medium text-orange-500">
                    <i class="fas fa-circle-notch fa-spin"></i> Connecting...
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pb-12">
        
        <div id="home-page" class="space-y-8">
            <div class="bg-white rounded-3xl p-12 text-center card-shadow">
                <h1 class="text-5xl font-extrabold text-slate-800 mb-4">Smart Library System</h1>
                <p class="text-slate-500 text-xl">Real-time monitoring of book scans and system status</p>
                
                <div id="system-badge" class="mt-8 inline-block px-8 py-3 rounded-full text-lg font-bold bg-gray-100 text-gray-500 transition-all">
                    SYSTEM STATUS: LOADING...
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-3xl card-shadow flex items-center space-x-6">
                    <div id="status-icon" class="w-16 h-16 bg-blue-500 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg">
                        <i class="fas fa-id-card"></i>
                    </div>
                    <div>
                        <h3 id="last-scan-title" class="text-2xl font-bold text-slate-800">No scans yet</h3>
                        <p id="last-scan-time" class="text-slate-400">-- : --</p>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-3xl card-shadow flex items-center space-x-6">
                    <div class="w-16 h-16 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg">
                        <i class="fas fa-book"></i>
                    </div>
                    <div>
                        <h3 class="text-slate-500 font-medium">Total Books Scanned Today</h3>
                        <p class="text-3xl font-bold text-slate-800"><span id="total-count">0</span> <span class="text-lg font-normal text-slate-400 ml-2">| Borrowed: <span id="borrowed-count">0</span></span></p>
                    </div>
                </div>
            </div>
        </div>

        <div id="dashboard-page" class="hidden">
            <div class="bg-white rounded-3xl card-shadow overflow-hidden">
                <div class="p-6 bg-slate-800 text-white flex justify-between items-center">
                    <h2 class="text-2xl font-bold">Activity Log (Google Sheets Sync)</h2>
                    <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm transition-all">
                        <i class="fas fa-sync-alt mr-1"></i> Refresh Now
                    </button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 border-b border-slate-100">
                            <tr>
                                <th class="p-4 font-bold text-slate-600">Card ID</th>
                                <th class="p-4 font-bold text-slate-600">Book Name</th>
                                <th class="p-4 font-bold text-slate-600">Status</th>
                                <th class="p-4 font-bold text-slate-600">Date</th>
                                <th class="p-4 font-bold text-slate-600">Time</th>
                            </tr>
                        </thead>
                        <tbody id="logs-table-body" class="divide-y divide-slate-100 text-slate-700">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- Logic & Syncing ---
        const API_BASE = window.location.origin;

        async function fetchData() {
            try {
                // 1. Get Logs
                const logsRes = await fetch(`${API_BASE}/api/logs`);
                const logs = await logsRes.json();
                updateUI(logs);

                // 2. Get System Status
                const statusRes = await fetch(`${API_BASE}/api/status`);
                const statusData = await statusRes.json();
                updateSystemStatus(statusData.isSystemActive);

                document.getElementById('connection-status').innerHTML = '<i class="fas fa-circle text-emerald-500 mr-1"></i> Live';
                document.getElementById('connection-status').className = 'text-sm font-medium text-emerald-600';
            } catch (err) {
                console.error("Fetch error:", err);
                document.getElementById('connection-status').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Disconnected';
                document.getElementById('connection-status').className = 'text-sm font-medium text-red-500';
            }
        }

        function updateUI(logs) {
            // تجاهل الصف الأول (Header)
            const dataRows = logs.slice(1).reverse(); // عرض الأحدث فوق
            const tbody = document.getElementById('logs-table-body');
            tbody.innerHTML = '';

            let total = 0;
            let borrowed = 0;

            dataRows.forEach((row, index) => {
                const [id, name, status, date, time] = row;
                
                // تحديث الجدول
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-4 font-mono text-sm">${id || ''}</td>
                    <td class="p-4">${name || ''}</td>
                    <td class="p-4">
                        <span class="px-3 py-1 rounded-full text-xs font-bold ${status === 'Borrowed' ? 'bg-orange-100 text-orange-600' : status === 'Returned' ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-blue-600'}">
                            ${status || ''}
                        </span>
                    </td>
                    <td class="p-4 text-slate-500">${date || ''}</td>
                    <td class="p-4 text-slate-500">${time || ''}</td>
                `;
                tbody.appendChild(tr);

                // تحديث الـ Stats للـ Home
                if (status === 'Borrowed' || status === 'Returned') total++;
                if (status === 'Borrowed') borrowed++;

                // تحديث أخر سحبة (Latest Scan)
                if (index === 0) {
                    document.getElementById('last-scan-title').innerText = `${name}: ${status}`;
                    document.getElementById('last-scan-time').innerText = time;
                }
            });

            document.getElementById('total-count').innerText = total;
            document.getElementById('borrowed-count').innerText = borrowed;
        }

        function updateSystemStatus(isActive) {
            const badge = document.getElementById('system-badge');
            if (isActive) {
                badge.innerText = "SYSTEM STATUS: ACTIVE";
                badge.className = "mt-8 inline-block px-8 py-3 rounded-full text-lg font-bold bg-emerald-100 text-emerald-600 border-2 border-emerald-200";
            } else {
                badge.innerText = "SYSTEM STATUS: LOCKED";
                badge.className = "mt-8 inline-block px-8 py-3 rounded-full text-lg font-bold bg-red-100 text-red-600 border-2 border-red-200";
            }
        }

        function showPage(page) {
            const homeBtn = document.getElementById('home-btn');
            const dashBtn = document.getElementById('dash-btn');
            const homePage = document.getElementById('home-page');
            const dashPage = document.getElementById('dashboard-page');

            if (page === 'home') {
                homePage.classList.remove('hidden');
                dashPage.classList.add('hidden');
                homeBtn.classList.add('active', 'text-white');
                dashBtn.classList.remove('active', 'bg-blue-500', 'text-white');
                dashBtn.classList.add('text-gray-600');
            } else {
                homePage.classList.add('hidden');
                dashPage.classList.remove('hidden');
                dashBtn.classList.add('active', 'text-white');
                homeBtn.classList.remove('active', 'bg-blue-500', 'text-white');
                homeBtn.classList.add('text-gray-600');
            }
        }

        // تحديث تلقائي كل 3 ثواني
        setInterval(fetchData, 3000);
        fetchData(); // أول مرة عند التحميل
    </script>
</body>
</html>
