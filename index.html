<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap');
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .nav-link { background: rgba(255, 255, 255, 0.8); transition: all 0.3s ease; }
        .nav-link.active { background: linear-gradient(135deg, #6366f1, #8b5cf6); box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4); color: white; }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); }
        #lock-screen { position: fixed; inset: 0; z-index: 9999; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px); display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen">

    <div id="lock-screen" class="hidden">
        <div class="glass-effect p-12 rounded-[40px] text-center max-w-md mx-4 card-shadow">
            <div class="w-24 h-24 bg-gradient-to-br from-red-500 to-rose-600 rounded-3xl flex items-center justify-center text-white text-4xl mb-8 mx-auto animate-pulse">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2 class="text-4xl font-black text-slate-800 mb-4">System Locked</h2>
            <p class="text-slate-500 text-lg mb-8">Please scan the <b>Admin Card</b> to access the dashboard.</p>
            <div class="flex items-center justify-center space-x-3 text-indigo-600 font-bold bg-indigo-50 py-3 rounded-2xl">
                <i class="fas fa-spinner fa-spin"></i>
                <span class="uppercase text-sm tracking-widest">Waiting for Admin...</span>
            </div>
        </div>
    </div>

    <nav class="glass-effect shadow-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex space-x-4">
                <button onclick="showPage('home')" id="home-btn" class="nav-link active px-8 py-3 rounded-2xl flex items-center font-bold">
                    <i class="fas fa-home mr-2"></i> Home
                </button>
                <button onclick="showPage('dashboard')" id="dash-btn" class="nav-link px-8 py-3 rounded-2xl flex items-center font-bold">
                    <i class="fas fa-chart-line mr-2"></i> Dashboard
                </button>
            </div>
            <div id="connection-status" class="px-5 py-2 rounded-xl bg-emerald-100 text-emerald-700 font-bold text-sm border border-emerald-200">
                <i class="fas fa-circle text-[10px] mr-2 animate-pulse"></i> LIVE
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="home-page" class="space-y-8">
            <div class="glass-effect rounded-[40px] p-16 text-center card-shadow">
                <h1 class="text-6xl font-black text-slate-800 mb-4">Smart Library</h1>
                <p class="text-xl text-slate-500 italic">"Secure Asset Monitoring System"</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div id="status-card-bg" class="glass-effect p-10 rounded-[35px] card-shadow flex items-center border-l-8 border-slate-300">
                    <div id="status-icon" class="w-20 h-20 bg-slate-200 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg mr-8">
                        <i class="fas fa-sync-alt fa-spin text-slate-400"></i>
                    </div>
                    <div>
                        <h3 id="system-text" class="text-4xl font-black text-slate-800">Syncing...</h3>
                        <p id="last-update-time" class="text-slate-400 font-mono">--:--:--</p>
                    </div>
                </div>

                <div class="glass-effect p-10 rounded-[35px] card-shadow flex items-center justify-between">
                    <div class="flex items-center">
                        <div class="w-20 h-20 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg mr-8">
                            <i class="fas fa-book"></i>
                        </div>
                        <h3 class="text-2xl font-bold text-slate-600">Borrowed</h3>
                    </div>
                    <p class="text-7xl font-black text-slate-800" id="borrowed-count">0</p>
                </div>
            </div>
        </div>

        <div id="dashboard-page" class="hidden">
            <div class="glass-effect rounded-[40px] card-shadow overflow-hidden">
                <div class="p-8 border-b flex justify-between items-center bg-slate-50/50">
                    <h2 class="text-3xl font-black text-slate-800">Activity Logs</h2>
                    <span id="total-scans-label" class="bg-white px-4 py-2 rounded-xl border shadow-sm font-bold text-slate-600">0 Records</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-slate-400 text-xs uppercase tracking-widest">
                            <tr>
                                <th class="px-8 py-4">Card ID</th>
                                <th class="px-8 py-4">Target</th>
                                <th class="px-8 py-4">Action</th>
                                <th class="px-8 py-4">Date & Time</th>
                            </tr>
                        </thead>
                        <tbody id="logs-table-body" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        const API_BASE = "https://library-backend-an3h.vercel.app"; 
        let isSystemLocked = true;

        async function fetchData() {
            try {
                const [logsRes, statusRes] = await Promise.all([
                    fetch(`${API_BASE}/api/logs`),
                    fetch(`${API_BASE}/api/status`)
                ]);
                
                const logs = await logsRes.json();
                const statusData = await statusRes.json();
                
                // تحديث حالة القفل بناءً على رد الباك-إند الصريح
                isSystemLocked = !statusData.isSystemActive;

                const lockScreen = document.getElementById('lock-screen');
                if (isSystemLocked) {
                    lockScreen.classList.remove('hidden');
                    showPage('home'); // إجبار العودة للهوم لو اتقفل
                } else {
                    lockScreen.classList.add('hidden');
                }

                updateUI(logs);
                updateSystemStatus(statusData.isSystemActive);
                
            } catch (err) {
                console.error("API Fetch Error:", err);
            }
        }

        function updateUI(logs) {
            if (!Array.isArray(logs) || logs.length <= 1) return;
            
            const dataRows = logs.slice(1); // تجاهل الهيدر
            const tbody = document.getElementById('logs-table-body');
            tbody.innerHTML = '';

            let borrowedSet = new Set(); // لحساب الكتب الفريدة المستعارة

            // معالجة اللوجات (الأحدث في الأخر في الشيت، فنعكسها للعرض)
            const displayRows = [...dataRows].reverse();

            dataRows.forEach(row => {
                const [id, name, status] = row;
                if (id === "34FA78A3") return; // تجاهل الأدمن في الحسابات
                
                if (status === "Borrowed") borrowedSet.add(name);
                if (status === "Returned") borrowedSet.delete(name);
            });

            displayRows.forEach(row => {
                const [id, name, status, date, time] = row;
                if (id === "34FA78A3") return;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="px-8 py-5 font-mono text-indigo-600 font-bold">${id}</td>
                    <td class="px-8 py-5 font-bold text-slate-800">${name}</td>
                    <td class="px-8 py-5">
                        <span class="px-3 py-1 rounded-lg text-[10px] font-black uppercase ${status === 'Borrowed' ? 'bg-orange-100 text-orange-600' : 'bg-emerald-100 text-emerald-600'}">
                            ${status}
                        </span>
                    </td>
                    <td class="px-8 py-5 text-slate-400 text-sm">${date} | ${time}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('borrowed-count').innerText = borrowedSet.size;
            document.getElementById('total-scans-label').innerText = `${dataRows.length} Scans`;
            if (displayRows.length > 0) document.getElementById('last-update-time').innerText = displayRows[0][4];
        }

        function updateSystemStatus(isActive) {
            const systemText = document.getElementById('system-text');
            const icon = document.getElementById('status-icon');
            const card = document.getElementById('status-card-bg');

            if (isActive) {
                systemText.innerHTML = "System <span class='text-emerald-500'>ACTIVE</span>";
                icon.innerHTML = '<i class="fas fa-check-circle"></i>';
                icon.className = "w-20 h-20 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg mr-8";
                card.style.borderLeftColor = "#10b981";
            } else {
                systemText.innerHTML = "System <span class='text-red-500'>LOCKED</span>";
                icon.innerHTML = '<i class="fas fa-lock"></i>';
                icon.className = "w-20 h-20 bg-red-500 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg mr-8";
                card.style.borderLeftColor = "#ef4444";
            }
        }

        function showPage(page) {
            if (page === 'dashboard' && isSystemLocked) return;
            
            document.getElementById('home-page').classList.toggle('hidden', page !== 'home');
            document.getElementById('dashboard-page').classList.toggle('hidden', page !== 'dashboard');
            document.getElementById('home-btn').classList.toggle('active', page === 'home');
            document.getElementById('dash-btn').classList.toggle('active', page === 'dashboard');
        }

        // تحديث كل 3 ثواني
        setInterval(fetchData, 3000);
        fetchData();
    </script>
</body>
</html>
