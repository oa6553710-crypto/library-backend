<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library System - Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .glass-effect { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.12); 
            box-shadow: 0 25px 45px -15px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        .glass-effect-alt { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        .nav-link { 
            background: rgba(255, 255, 255, 0.06); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: rgba(255, 255, 255, 0.9);
        }
        .nav-link.active { 
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); 
            box-shadow: 0 20px 40px rgba(59, 130, 246, 0.4); 
            color: white;
            transform: translateY(-2px);
        }
        #lock-screen { 
            position: fixed; 
            inset: 0; 
            z-index: 9999; 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(30px); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .hidden { display: none !important; }
        .table-row-hover:hover { background: rgba(255, 255, 255, 0.08) !important; transform: scale(1.005); }
        .mono-font { font-family: 'JetBrains Mono', monospace; }
        .metric-number { 
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .float-animation { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="glass-effect p-16 rounded-3xl text-center max-w-lg mx-4 float-animation">
            <div class="w-28 h-28 glass-effect-alt rounded-3xl flex items-center justify-center text-white text-4xl mb-10 mx-auto border-2 border-white/20">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h2 class="text-5xl font-black text-white mb-6 tracking-tight leading-tight uppercase">Access Required</h2>
            <p class="text-xl text-slate-300 mb-12 font-medium leading-relaxed">
                Please present the <span class="font-black text-cyan-300">ADMIN RFID CARD</span> to unlock the dashboard.
            </p>
            <div class="flex items-center justify-center space-x-4 text-cyan-400 font-bold bg-white/10 py-4 px-8 rounded-2xl border border-white/20 backdrop-blur-sm">
                <i class="fas fa-wifi text-2xl animate-pulse"></i>
                <span class="uppercase text-lg tracking-widest">Awaiting Auth...</span>
                <div class="w-3 h-3 bg-cyan-400 rounded-full animate-ping"></div>
            </div>
        </div>
    </div>

    <nav class="glass-effect shadow-2xl sticky top-0 z-50 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-8 h-24 flex justify-between items-center">
            <div class="flex space-x-6">
                <button onclick="showPage('home')" id="home-btn" class="nav-link active px-10 py-5 rounded-3xl flex items-center font-bold text-lg group">
                    <i class="fas fa-home text-xl mr-3"></i> Dashboard
                </button>
                <button onclick="showPage('dashboard')" id="dash-btn" class="nav-link px-10 py-5 rounded-3xl flex items-center font-bold text-lg group">
                    <i class="fas fa-chart-bar text-xl mr-3"></i> Activity Log
                </button>
            </div>
            <div id="connection-status" class="px-6 py-3 rounded-2xl border-2 border-emerald-400/50 text-emerald-300 font-bold text-sm flex items-center shadow-lg bg-emerald-500/10">
                <i class="fas fa-signal mr-2 animate-pulse"></i> LIVE
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-20">
        <div id="home-page" class="space-y-12">
            <div class="glass-effect rounded-3xl p-20 text-center">
                <h1 class="text-7xl font-black text-white mb-4">Smart Library</h1>
                <p class="text-2xl text-slate-400 italic">Advanced RFID Asset Tracking</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div id="status-card-bg" class="glass-effect p-12 rounded-3xl flex items-center border-l-8 border-slate-500 h-64">
                    <div id="status-icon" class="w-28 h-28 bg-slate-800/50 rounded-3xl flex items-center justify-center text-white text-4xl mr-10 border-2 border-white/10">
                        <i class="fas fa-sync-alt fa-spin"></i>
                    </div>
                    <div>
                        <h3 id="system-text" class="text-5xl font-black text-white mb-2">Syncing...</h3>
                        <p id="last-update-time" class="text-slate-400 font-bold text-lg mono-font">00:00:00</p>
                    </div>
                </div>

                <div class="glass-effect p-12 rounded-3xl flex items-center justify-between h-64">
                    <div class="flex items-center">
                        <div class="w-28 h-28 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-3xl flex items-center justify-center text-white text-4xl mr-10 border-4 border-white/20">
                            <i class="fas fa-book-open"></i>
                        </div>
                        <div>
                            <h3 class="text-3xl font-bold text-white mb-1">Borrowed</h3>
                            <p class="text-slate-400 tracking-widest">ACTIVE LOANS</p>
                        </div>
                    </div>
                    <p class="text-8xl font-black metric-number" id="borrowed-count">0</p>
                </div>
            </div>
        </div>

        <div id="dashboard-page" class="hidden">
            <div class="glass-effect rounded-3xl overflow-hidden">
                <div class="p-12 border-b border-white/10 flex justify-between items-center">
                    <h2 class="text-4xl font-black text-white">📊 Activity Timeline</h2>
                    <span id="total-scans-label" class="glass-effect-alt px-8 py-4 rounded-2xl border border-white/20 text-white font-bold mono-font">0 Records</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-white/5 text-slate-400 text-xs uppercase tracking-widest">
                            <tr>
                                <th class="px-12 py-8">RFID ID</th>
                                <th class="px-12 py-8">Asset</th>
                                <th class="px-12 py-8">Status</th>
                                <th class="px-12 py-8">Time</th>
                            </tr>
                        </thead>
                        <tbody id="logs-table-body" class="divide-y divide-white/10"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = "https://library-backend-an3h.vercel.app"; 
        let isSystemLocked = true;

        async function fetchData() {
            const lockScreen = document.getElementById('lock-screen');
            try {
                const [logsRes, statusRes] = await Promise.all([
                    fetch(`${API_BASE}/api/logs`),
                    fetch(`${API_BASE}/api/status`)
                ]);
                
                if (!logsRes.ok || !statusRes.ok) throw new Error("Server Response Error");

                const logs = await logsRes.json();
                const statusData = await statusRes.json();
                
                console.log("Status Received:", statusData.isSystemActive);

                // التحكم الفوري في شاشة القفل
                if (statusData.isSystemActive === true) {
                    isSystemLocked = false;
                    lockScreen.classList.add('hidden');
                } else {
                    isSystemLocked = true;
                    lockScreen.classList.remove('hidden');
                    showPage('home');
                }

                updateUI(logs);
                updateSystemStatus(statusData.isSystemActive);
                
            } catch (err) {
                console.error("API Connection Failed:", err);
                // في حالة الخطأ بنخليها مقفولة كإجراء أمان
                lockScreen.classList.remove('hidden');
            }
        }

        function updateUI(logs) {
            if (!Array.isArray(logs) || logs.length <= 1) return;
            
            const dataRows = logs.slice(1);
            const tbody = document.getElementById('logs-table-body');
            tbody.innerHTML = '';
            let borrowedSet = new Set();
            const displayRows = [...dataRows].reverse();

            dataRows.forEach(row => {
                const [id, name, status] = row;
                if (id === "34FA78A3") return;
                if (status.trim() === "Borrowed") borrowedSet.add(name);
                if (status.trim() === "Returned") borrowedSet.delete(name);
            });

            displayRows.forEach(row => {
                const [id, name, status, date, time] = row;
                if (id === "34FA78A3") return;

                const tr = document.createElement('tr');
                tr.className = "table-row-hover transition-all border-white/5";
                tr.innerHTML = `
                    <td class="px-12 py-8 mono-font text-cyan-400 font-bold">${id}</td>
                    <td class="px-12 py-8 font-bold text-white">${name}</td>
                    <td class="px-12 py-8">
                        <span class="px-4 py-2 rounded-lg text-[10px] font-black uppercase ${status.trim() === 'Borrowed' ? 'bg-orange-500/20 text-orange-300' : 'bg-emerald-500/20 text-emerald-300'}">
                            ${status}
                        </span>
                    </td>
                    <td class="px-12 py-8 text-slate-400 mono-font text-sm">${time}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('borrowed-count').innerText = borrowedSet.size;
            document.getElementById('total-scans-label').innerText = `${dataRows.length} Records`;
            if (displayRows.length > 0) document.getElementById('last-update-time').innerText = displayRows[0][4];
        }

        function updateSystemStatus(isActive) {
            const systemText = document.getElementById('system-text');
            const icon = document.getElementById('status-icon');
            const card = document.getElementById('status-card-bg');

            if (isActive) {
                systemText.innerHTML = "System <span class='text-emerald-400'>ONLINE</span>";
                icon.innerHTML = '<i class="fas fa-check-circle text-4xl"></i>';
                icon.className = "w-28 h-28 bg-emerald-500/20 rounded-3xl flex items-center justify-center text-emerald-400 border-4 border-emerald-500/30";
                card.style.borderLeftColor = "#10b981";
            } else {
                systemText.innerHTML = "System <span class='text-red-400'>LOCKED</span>";
                icon.innerHTML = '<i class="fas fa-lock text-4xl"></i>';
                icon.className = "w-28 h-28 bg-red-500/20 rounded-3xl flex items-center justify-center text-red-400 border-4 border-red-500/30";
                card.style.borderLeftColor = "#ef4444";
            }
        }

        function showPage(page) {
            if (page === 'dashboard' && isSystemLocked) return;
            document.getElementById('home-page').classList.toggle('hidden', page !== 'home');
            document.getElementById('dashboard-page').classList.toggle('hidden', page !== 'dashboard');
            document.getElementById('home-btn').classList.toggle('active', page === 'home');
            document.getElementById('dash-btn').classList.toggle('active', page === 'dashboard');
        }

        // تحديث كل 3 ثواني
        setInterval(fetchData, 3000);
        fetchData(); 
    </script>
</body>
</html>
